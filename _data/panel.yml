title: News
description: |
  <div id="vn-news-panel">
    <style>
      #vn-news-panel { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
      #vn-news-panel h2 { font-size: 1.6rem; border-bottom: 3px solid var(--primary, #509e2f); padding-bottom: 0.4rem; margin-bottom: 1.2rem; }
      .vn-news-card { background: #fff; border: 1px solid #e0e0e0; border-left: 4px solid var(--primary, #509e2f); border-radius: 4px; padding: 1rem 1.2rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
      .vn-news-card a { font-weight: 600; font-size: 1rem; text-decoration: none; color: var(--primary, #509e2f); }
      .vn-news-card a:hover { text-decoration: underline; }
      .vn-news-meta { margin-top: 0.4rem; font-size: 0.88rem; color: #555; display: grid; grid-template-columns: auto 1fr; gap: 0.15rem 0.5rem; }
      .vn-news-meta span.label { font-weight: 600; color: #333; }
      .vn-news-empty { color: #777; font-style: italic; }
    </style>

    <h2>🗞️ News — Recent Datasets</h2>
    <div id="vn-news-cards"><em>Loading...</em></div>

    <script>
    (function() {
      var DATASET_KEYS = [
  'e61dbcec-5082-4a20-9d15-0be61dac7720', '1c3d0e60-90fe-48e2-9536-e3b0583c4172', 'af2e74e4-bd2e-4983-97ac-e21f6cc430a0',
  '4abd984b-122c-44a0-8c92-b37e2f5299b1', '94ffb88e-d385-4846-888f-038edba9fff6', '02e8ee36-9f83-4850-a0f2-edcaacb80818',
  'fc1dd9e3-ff53-4d57-9d8e-e29afbb955b8', '88da84d8-6c33-4012-828a-cdf738e542b9', 'd7add022-2594-4816-9c37-bc50fa8c9a61',
  '4785284d-b827-4d9e-95db-de23d527967c', 'bc28777c-2da4-4a65-9810-7389cbf62834', '5ed74de7-0ea3-4304-a4d5-882f129369b5',
  '8d870547-a0b3-4e90-9c8f-f9465967dd9d', '48c0f475-61e6-4543-9cab-c67fae9000e2', '04939588-db37-4806-bb09-a95886f7741e',
  'da3c67c9-aad8-4404-9f5d-5fee08b36a72', 'fac87892-68c8-444a-9ae9-46273fdff724', 'e9e199ed-55eb-4cff-bd2d-e3328682e477',
  'b2390da7-9704-4215-b038-3727df6e7fee', 'b6db7aeb-e202-45a4-ac81-dd2cba4c5d68', 'c5af1e42-d20b-4b76-8454-616b81c8c891',
  '53d694e3-2e85-4996-ab1b-e4a54bd4d66d', '1154b689-89aa-4d28-bfae-96a51865e896', '188faa70-4b1d-482a-844d-face3f9aec9b',
  '4a2e5415-dc09-47a2-8073-8503fb42eabd', '99cb9e37-4cf6-4525-977d-10080fb9e094', '48744dd9-d140-4248-b3ee-0233697de369',
  '6b02775d-cf87-4163-81f2-b4ac30f291ea'
      ];

      function formatDate(iso) {
        if (!iso) return 'Unknown';
        return new Date(iso).toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function getTaxonomicScope(dataset) {
        var names = [];
        (dataset.taxonomicCoverages || []).forEach(function(cov) {
          (cov.coverages || []).forEach(function(c) {
            if (c.scientificName) names.push(c.scientificName);
          });
        });
        if (names.length) return names.slice(0, 3).join(', ');
        var taxonKw = (dataset.keywords || [])
          .map(function(k){ return k.keyword || k; })
          .filter(function(k){ return /culicoides|mosquito|tick|sandfly|aedes|anopheles|ixodes|culex/i.test(k); });
        return taxonKw.length ? taxonKw.slice(0, 3).join(', ') : '—';
      }

      var container = document.getElementById('vn-news-cards');

      Promise.all(DATASET_KEYS.map(function(key) {
        return fetch('https://api.gbif.org/v1/dataset/' + key).then(function(r){ return r.json(); });
      })).then(function(datasets) {

        // Sort ALL datasets by pubDate descending, take the 3 most recent
        var top3 = datasets
          .filter(function(ds){ return ds.pubDate || ds.created; })
          .sort(function(a, b){
            return new Date(b.pubDate || b.created) - new Date(a.pubDate || a.created);
          })
          .slice(0, 3);

        if (!top3.length) {
          container.innerHTML = '<p class="vn-news-empty">No dataset information available.</p>';
          return;
        }

        return Promise.all(top3.map(function(ds) {
          return fetch('https://api.gbif.org/v1/organization/' + ds.publishingOrganizationKey)
            .then(function(r){ return r.json(); })
            .then(function(org){ return { ds: ds, publisher: org.title || '—' }; });
        })).then(function(items) {
          container.innerHTML = items.map(function(item) {
            var ds = item.ds;
            return [
              '<div class="vn-news-card">',
              '  <a href="https://www.gbif.org/dataset/' + ds.key + '" target="_blank" rel="noopener">' + (ds.title || ds.key) + '</a>',
              '  <div class="vn-news-meta">',
              '    <span class="label">Published:</span><span>' + formatDate(ds.pubDate || ds.created) + '</span>',
              '    <span class="label">Publisher:</span><span>' + item.publisher + '</span>',
              '    <span class="label">Taxonomic scope:</span><span>' + getTaxonomicScope(ds) + '</span>',
              '  </div>',
              '</div>'
            ].join('\n');
          }).join('\n');
        });

      }).catch(function(err) {
        container.innerHTML = '<p class="vn-news-empty">Could not load dataset news. Please try again later.</p>';
        console.error('VectorNet News panel error:', err);
      });
    })();
    </script>
  </div>
