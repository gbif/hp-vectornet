# Footer content is organized in columns.
# You can also add a small print license statement at the bottom.

# Columns (the more you add, the narrower they will be)

columns:
  - name: ""
    description: |
      <div class="footer-partners-wrapper">
        <h3 class="footer-partners-title">Management</h3>
        <div class="footer-partners">
          <a href="https://www.ecdc.europa.eu/en" target="_blank" rel="noopener noreferrer">
            <img src="/assets/images/logo-ecdc.png" alt="ECDC logo" title="European Centre for Disease Prevention and Control (ECDC)">
          </a>
          <a href="https://www.efsa.europa.eu/en" target="_blank" rel="noopener noreferrer">
            <img src="/assets/images/efsa.svg" alt="EFSA logo" title="European Food Safety Authority (EFSA)">
          </a>
        </div>
      </div>




- name: ""
    description: |
      <div class="footer-partners-wrapper">
        <h3 class="footer-partners-title">Help desk</h3>
        <div class="footer-contacts">
          <p>vector.help@efsa.epimundi.com</p>
        </div>
      </div>


  
